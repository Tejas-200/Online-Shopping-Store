{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Welcome Back</h2>
    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
        </div>
	<div class="text-right mt-1">
    <a href="/forgot-password" class="text-xs text-indigo-600 hover:underline">Forgot password?</a>
</div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition">
            Log In
        </button>
    </form>
    <p class="text-sm text-center text-gray-600 mt-4">
        Don't have an account? <a href="/register" class="text-indigo-600 hover:underline">Register here</a>.
    </p>
</div>
{% endblock %}
