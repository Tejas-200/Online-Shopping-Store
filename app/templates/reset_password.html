{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Set New Password</h2>
    <p class="text-sm text-gray-500 text-center mb-6 font-mono text-xs bg-gray-50 p-2 rounded break-all">
        Token verified: {{ token[:15] }}...
    </p>
    
    <form action="/reset-password/{{ token }}" method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
            <input type="password" name="password" required placeholder="Choose a strong password" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
